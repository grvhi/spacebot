name: Build & Release (with UI)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('**/Cargo.toml') }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build OpenCode embed
        run: ./scripts/build-opencode-embed.sh

      - name: Build frontend
        working-directory: interface
        run: |
          rm -f package-lock.json bun.lock bun.lockb
          npm install
          npx vite build

      - name: Build binary
        run: cargo build --release --features metrics

      - name: Package
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mkdir -p dist
          cp target/release/spacebot dist/spacebot
          tar -czvf dist/spacebot-${VERSION}-x86_64-unknown-linux-gnu.tar.gz -C dist spacebot

      - name: Clean old release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/latest-build --jq '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Cleaning old assets from release $RELEASE_ID..."
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[].id' | while read ASSET_ID; do
              echo "Deleting asset $ASSET_ID"
              gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID/assets/$ASSET_ID
            done
          fi

      - name: Create/update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Build"
          prerelease: true
          files: dist/spacebot-*-x86_64-unknown-linux-gnu.tar.gz
          body: |
            Auto-built from `${{ github.sha }}` on `${{ github.ref_name }}`
